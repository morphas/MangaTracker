<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MangaTracker - Editoras</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 14px 35px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0 0 6px 0;
        }

        p {
            margin: 0 0 16px 0;
            color: #cfcfcf;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #bdbdbd;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            background: #0f0f0f;
            color: white;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #1b1b1b;
            color: white;
            cursor: pointer;
            font-weight: 800;
        }

            button:hover {
                background: #222;
            }

        .muted {
            color: #aaa;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .editora {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 14px;
        }

        .title {
            font-weight: 900;
            margin-bottom: 6px;
        }

        .meta {
            color: #8c8c8c;
            font-size: .9em;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar compartilhada -->
    <div id="navbarHost"></div>

    <div class="container">
        <div class="card">
            <h1>🏢 Editoras</h1>
            <p>Conheça as editoras cadastradas no MangaTracker.</p>

            <label>Buscar editora</label>
            <input id="busca" type="text" placeholder="Ex: Panini, JBC..." />

            <div class="actions">
                <button id="btnBuscar">Buscar</button>
                <button id="btnTodos">Todas</button>
                <span class="muted" id="count">—</span>
            </div>

            <div class="grid" id="listaBox"></div>
        </div>
    </div>

    <script src="shared/navbar.js"></script>
    <script>
        if (typeof mountNavbar === 'function') mountNavbar();

        function escapeHtml(s) {
            return String(s ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function setCount(txt) {
            document.getElementById("count").textContent = txt;
        }

        async function carregarEditoras() {
            const box = document.getElementById("listaBox");
            box.innerHTML = `<div class="muted">Carregando...</div>`;
            setCount("Carregando...");

            try {
                const res = await fetch("/api/editoras");
                const dados = await res.json().catch(() => ([]));

                if (!res.ok) {
                    box.innerHTML = `<div class="muted">Erro ao carregar editoras.</div>`;
                    setCount("—");
                    return;
                }

                const busca = document.getElementById("busca").value.trim().toLowerCase();

                let lista = Array.isArray(dados) ? dados : [];

                if (busca) {
                    lista = lista.filter(e =>
                        (e.nome ?? "").toLowerCase().includes(busca) ||
                        (e.descricao ?? "").toLowerCase().includes(busca)
                    );
                }

                if (lista.length === 0) {
                    box.innerHTML = `<div class="muted">Nenhuma editora encontrada.</div>`;
                    setCount("0 resultado(s)");
                    return;
                }

                setCount(`${lista.length} resultado(s)`);

                box.innerHTML = lista.map(e => `
                    <div class="editora">
                        <div class="title">${escapeHtml(e.nome)}</div>
                        <div class="meta">
                            ${escapeHtml(e.descricao ?? "Sem descrição disponível.")}
                        </div>
                    </div>
                `).join("");

            } catch {
                box.innerHTML = `<div class="muted">Erro ao conectar com a API.</div>`;
                setCount("—");
            }
        }

        document.getElementById("btnBuscar").addEventListener("click", carregarEditoras);

        document.getElementById("btnTodos").addEventListener("click", async () => {
            document.getElementById("busca").value = "";
            await carregarEditoras();
        });

        document.getElementById("busca").addEventListener("input", () => {
            carregarEditoras();
        });

        // Inicialização
        carregarEditoras();
    </script>

</body>
</html>
