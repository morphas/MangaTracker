<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manga Tracker - Criar Conta</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
        }

        /* Wrapper pra manter o card centralizado sem atrapalhar a navbar */
        .pageCenter {
            min-height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            box-sizing: border-box;
        }

        .cadastro-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #e21;
        }

        h2 {
            text-align: center;
            margin: 0 0 20px 0;
        }

        label {
            font-size: 0.9em;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #333;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 12px;
            background: #e21;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

            .btn-cadastrar:hover {
                background: #ff3333;
            }

        .link-voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9em;
        }

            .link-voltar:hover {
                color: #ddd;
            }
    </style>
</head>

<body>
    <!-- ✅ Navbar compartilhada -->
    <div id="navbarHost"></div>

    <div class="pageCenter">
        <div class="cadastro-card">
            <h2>Criar Nova Conta</h2>

            <label>Nome de Usuário</label>
            <input type="text" id="novoUsuario" placeholder="Ex: RafaelProgramador">

            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">

            <label>Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha forte">

            <button class="btn-cadastrar" onclick="realizarCadastro()">Criar Minha Conta</button>

            <a href="index.html" class="link-voltar">← Voltar para a Home</a>
        </div>
    </div>

    <!-- ✅ Navbar compartilhada -->
    <script src="shared/navbar.js"></script>

    <script>
        mountNavbar();

        async function realizarCadastro() {
            const nome = document.getElementById('novoUsuario').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if (!nome || !email || !senha) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            try {
                const resposta = await fetch('/api/usuario/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                const resultado = await resposta.json().catch(() => ({}));

                if (resposta.ok) {
                    alert('Sucesso: ' + (resultado.mensagem || 'Conta criada!'));
                    window.location.href = 'login.html';
                } else {
                    alert('Erro: ' + (resultado.erro || 'Não foi possível cadastrar.'));
                }
            } catch (erro) {
                alert('Erro ao conectar com o servidor. Verifique se deu Play no Visual Studio.');
            }
        }
    </script>
</body>
</html>
