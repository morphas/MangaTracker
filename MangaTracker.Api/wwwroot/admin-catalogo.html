<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Admin - Cadastrar Mangá</title>
    <style>
        body {
            font-family: Segoe UI, sans-serif;
            background: #121212;
            color: #fff;
            margin: 0;
        }

        .wrap {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 18px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2d2d2d;
            color: #fff;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-top: 14px;
            color: #bbb;
        }

        button {
            margin-top: 16px;
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #e21;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

            button:hover {
                background: #ff3333;
            }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .muted {
            color: #aaa;
            font-size: .9em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Admin — Cadastrar Mangá</h1>
        <div class="card">
            <div class="muted">Você precisa estar logado como <b>admin</b> (badge “admin” no topo).</div>

            <label>Título</label>
            <input id="titulo" placeholder="Ex: Jujutsu Kaisen" />

            <div class="row">
                <div>
                    <label>Lançado no Brasil?</label>
                    <select id="lancado">
                        <option value="true">Sim</option>
                        <option value="false" selected>Não</option>
                    </select>
                </div>
                <div>
                    <label>Editora (só se lançado no Brasil)</label>
                    <input id="editora" placeholder="Ex: Panini, JBC, NewPOP..." />
                </div>
            </div>

            <label>Total de capítulos (opcional)</label>
            <input id="totalCapitulos" type="number" min="1" placeholder="Deixe vazio se não souber" />

            <button onclick="cadastrar()">Cadastrar</button>
            <button onclick="location.href='index.html'" style="background:#333;margin-left:8px;">Voltar</button>

            <div id="msg" class="muted"></div>
        </div>
    </div>

    <script>
    function getUsuarioLogado() {
      try { return JSON.parse(localStorage.getItem('usuarioLogado')); }
      catch { return null; }
    }

    async function cadastrar() {
      const u = getUsuarioLogado();
      const msg = document.getElementById('msg');
      msg.textContent = "";

      if (!u?.id) { alert("Você precisa fazer login."); return; }
      if (!u.isAdmin) { alert("Apenas admin pode cadastrar."); return; }

      const titulo = document.getElementById('titulo').value.trim();
      const lancadoNoBrasil = document.getElementById('lancado').value === "true";
      let editora = document.getElementById('editora').value.trim();
      const totalRaw = document.getElementById('totalCapitulos').value.trim();
      const totalCapitulos = totalRaw ? Number(totalRaw) : null;

      if (!titulo) { alert("Título é obrigatório."); return; }

      if (!lancadoNoBrasil) editora = ""; // força vazio se não lançado

      const res = await fetch('/api/catalogo', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': u.id
        },
        body: JSON.stringify({ titulo, lancadoNoBrasil, editora: editora || null, totalCapitulos })
      });

      const data = await res.json();

      if (res.ok) {
        msg.textContent = "✅ Cadastrado com sucesso!";
        document.getElementById('titulo').value = "";
        document.getElementById('editora').value = "";
        document.getElementById('totalCapitulos').value = "";
      } else {
        alert(data.erro || "Erro ao cadastrar.");
      }
    }
    </script>
</body>
</html>
