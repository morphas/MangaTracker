<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MangaTracker - Admin</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
        }

        /* ====== PAGE ====== */
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 14px 35px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0 0 6px 0;
        }

        p {
            margin: 0 0 16px 0;
            color: #cfcfcf;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            color: #bdbdbd;
            font-size: .95em;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            background: #0f0f0f;
            color: white;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #1b1b1b;
            color: white;
            cursor: pointer;
            font-weight: 800;
        }

            button:hover {
                background: #222;
            }

        .btn-danger {
            border-color: #e50914;
            background: #e50914;
        }

            .btn-danger:hover {
                background: #ff1a1a;
                border-color: #ff1a1a;
            }

        .smallbtn {
            padding: 8px 10px;
            border-radius: 10px;
            font-size: .9em;
        }

        .warn {
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 12px 14px;
            border-radius: 14px;
            color: #d6d6d6;
            margin-bottom: 14px;
            display: none;
        }

        .hidden {
            display: none;
        }

        .list {
            margin-top: 10px;
            border-top: 1px solid #242424;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #1f1f1f;
            align-items: center;
        }

            .row:last-child {
                border-bottom: none;
            }

        .title {
            font-weight: 900;
        }

        .meta {
            color: #8c8c8c;
            font-size: .85em;
            margin-top: 3px;
            line-height: 1.35;
        }

        /* Filtro A-Z */
        .letters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .chip {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid #2a2a2a;
            background: #0f0f0f;
            color: #ddd;
            font-weight: 800;
            cursor: pointer;
            font-size: .85em;
        }

            .chip:hover {
                background: #171717;
            }

            .chip.active {
                border-color: #e50914;
                color: #fff;
                background: rgba(229,9,20,.15);
            }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 16px;
        }

        .modal {
            width: 100%;
            max-width: 560px;
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 18px;
            box-shadow: 0 18px 60px rgba(0,0,0,.7);
            padding: 18px;
        }

            .modal h3 {
                margin: 0 0 10px 0;
            }

        .muted {
            color: #aaa;
            font-size: .9em;
            margin-bottom: 12px;
        }

        /* checkbox */
        .checkRow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

            .checkRow input[type="checkbox"] {
                width: 18px;
                height: 18px;
                margin: 0;
                accent-color: #e50914;
            }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- ✅ Navbar compartilhada -->
    <div id="navbarHost"></div>

    <div class="container">
        <h1>Área do Admin</h1>
        <p>Cadastre, edite e remova mangás do catálogo.</p>

        <div class="warn" id="warnBox"></div>

        <div class="grid">
            <!-- Card cadastro -->
            <div class="card">
                <h2>Cadastrar novo mangá</h2>
                <p>Somente admin. Isso salva no Postgres via API.</p>

                <label>Título</label>
                <input id="titulo" type="text" placeholder="Ex: Fullmetal Alchemist" />

                <div class="checkRow">
                    <input type="checkbox" id="lancadoNoBrasil" />
                    <label for="lancadoNoBrasil" style="margin:0; cursor:pointer;">Lançado no Brasil</label>
                </div>

                <div id="editoraBox" class="hidden">
                    <label>Editora</label>
                    <input id="editora" type="text" placeholder="Ex: Panini" />
                </div>

                <div class="actions">
                    <button class="btn-danger" id="btnCadastrar">Cadastrar</button>
                    <button id="btnLimpar">Limpar</button>
                </div>
            </div>

            <!-- Card catálogo -->
            <div class="card">
                <h2>Catálogo</h2>
                <p>Busque, filtre por letra e edite/exclua itens.</p>

                <label>Pesquisar por nome</label>
                <input id="q" type="text" placeholder="Ex: dragon, naruto, one..." />

                <div class="actions" style="margin-top:12px;">
                    <button id="btnBuscar">Buscar</button>
                    <button id="btnTodos">Todos</button>
                    <span class="muted" id="catalogoCount" style="align-self:center;">—</span>
                </div>

                <div class="letters" id="lettersBar"></div>
                <div class="list" id="catalogoList"></div>
            </div>

            <!-- Card logs -->
            <div class="card" style="grid-column: 1 / -1;">
                <h2>📜 Logs do Admin</h2>
                <p>Últimas ações feitas no catálogo (cadastro, edição, exclusão).</p>

                <div class="actions" style="margin-top:12px;">
                    <button id="btnLogs">Atualizar logs</button>
                    <span class="muted" id="logsStatus" style="align-self:center;">—</span>
                </div>

                <div class="list" id="logsList"></div>
            </div>
        </div>
    </div>

    <!-- Modal editar -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <h3>Editar mangá</h3>
            <div class="muted" id="modalIdInfo">—</div>

            <label>Título</label>
            <input id="editTitulo" type="text" />

            <div class="checkRow">
                <input type="checkbox" id="editLancado" />
                <label for="editLancado" style="margin:0; cursor:pointer;">Lançado no Brasil</label>
            </div>

            <div id="editEditoraBox" class="hidden">
                <label>Editora</label>
                <input id="editEditora" type="text" placeholder="Ex: Panini" />
            </div>

            <div class="actions" style="margin-top:14px;">
                <button class="btn-danger" id="btnSalvarEdicao">Salvar</button>
                <button id="btnCancelarEdicao">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- ✅ Navbar compartilhada -->
    <script src="shared/navbar.js"></script>

    <script>
        // ========= Helpers =========
        function getUsuarioLogado() {
            try { return JSON.parse(localStorage.getItem('usuarioLogado')); }
            catch { return null; }
        }

        async function apiFetch(url, options = {}) {
            const u = getUsuarioLogado();
            const headers = options.headers ? { ...options.headers } : {};
            if (u?.id) headers['X-User-Id'] = u.id;
            return fetch(url, { ...options, headers });
        }

        function showWarn(msg) {
            const box = document.getElementById('warnBox');
            box.style.display = 'block';
            box.textContent = msg;
        }

        function hideWarn() {
            const box = document.getElementById('warnBox');
            box.style.display = 'none';
            box.textContent = '';
        }

        // ========= Proteção: só admin =========
        async function garantirAdmin() {
            const u = getUsuarioLogado();
            if (!u?.id) {
                alert('Você precisa estar logado para acessar o Admin.');
                window.location.href = 'login.html';
                return false;
            }

            try {
                const res = await apiFetch('/api/usuario/atual');
                const dados = await res.json();

                if (!dados?.logado) {
                    alert('Seu login não está válido. Faça login de novo.');
                    window.location.href = 'login.html';
                    return false;
                }

                if (!dados.isAdmin) {
                    alert('Acesso negado. Apenas administradores.');
                    window.location.href = 'index.html';
                    return false;
                }

                return true;
            } catch {
                alert('Erro ao validar usuário no servidor. Verifique se a API está rodando.');
                return false;
            }
        }

        // ========= Letras A-Z =========
        let filtroLetra = '';
        let debounceTimer = null;

        function setCatalogoCount(txt) {
            document.getElementById('catalogoCount').textContent = txt;
        }

        function montarLetras() {
            const bar = document.getElementById('lettersBar');
            const letras = ['Todos', '#'];
            for (let i = 65; i <= 90; i++) letras.push(String.fromCharCode(i));

            bar.innerHTML = letras.map(l => {
                const key = l === 'Todos' ? '' : l;
                return `<button class="chip ${filtroLetra === key ? 'active' : ''}" data-letter="${key}">${l}</button>`;
            }).join('');

            bar.querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => {
                    filtroLetra = b.dataset.letter || '';
                    montarLetras();
                    carregarCatalogo();
                });
            });
        }

        // ========= Catálogo =========
        async function carregarCatalogo() {
            hideWarn();
            setCatalogoCount('Carregando...');

            const container = document.getElementById('catalogoList');
            container.innerHTML = '<div style="padding:12px;color:#aaa;">Carregando...</div>';

            const q = document.getElementById('q').value.trim();
            const url = q ? `/api/catalogo?q=${encodeURIComponent(q)}` : `/api/catalogo`;

            try {
                const res = await apiFetch(url);
                const dados = await res.json();

                if (!res.ok) {
                    container.innerHTML = '';
                    showWarn(dados?.erro || 'Erro ao carregar.');
                    setCatalogoCount('—');
                    return;
                }

                let lista = (dados || []).sort((a, b) =>
                    (a.titulo || '').localeCompare(b.titulo || '', 'pt-BR', { sensitivity: 'base' })
                );

                if (filtroLetra === '#') {
                    lista = lista.filter(m => {
                        const c = (m.titulo || '').charAt(0).toUpperCase();
                        return c < 'A' || c > 'Z';
                    });
                } else if (filtroLetra) {
                    lista = lista.filter(m => (m.titulo || '').toUpperCase().startsWith(filtroLetra));
                }

                if (lista.length === 0) {
                    container.innerHTML = '<div style="padding:12px;color:#aaa;">Nenhum resultado.</div>';
                    setCatalogoCount('0 resultado(s)');
                    return;
                }

                setCatalogoCount(`${lista.length} resultado(s)`);

                container.innerHTML = lista.map(m => `
                        <div class="row">
                            <div style="min-width:0;">
                                <div class="title">${escapeHtml(m.titulo)}</div>
                                <div class="meta">
                                    Lançado BR: ${m.lancadoNoBrasil ? 'Sim' : 'Não'}
                                    • Editora: ${escapeHtml(m.editora || '—')}
                                    <br/>ID: ${m.id}
                                </div>
                            </div>
                            <div style="display:flex;gap:10px; flex-wrap:wrap; justify-content:flex-end;">
                                <button class="smallbtn" onclick="abrirEditar('${m.id}','${escapeHtml(m.titulo)}',${m.lancadoNoBrasil},'${escapeHtml(m.editora || '')}')">Editar</button>
                                <button class="smallbtn btn-danger" onclick="excluirManga('${m.id}','${escapeHtml(m.titulo)}')">Excluir</button>
                            </div>
                        </div>
                    `).join('');

            } catch {
                container.innerHTML = '';
                showWarn('Erro ao conectar com a API.');
                setCatalogoCount('—');
            }
        }

        function escapeHtml(s) {
            return String(s)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function unescapeHtml(s) {
            return String(s)
                .replaceAll('&lt;', '<')
                .replaceAll('&gt;', '>')
                .replaceAll('&quot;', '"')
                .replaceAll('&#039;', "'")
                .replaceAll('&amp;', '&');
        }

        // ========= Busca =========
        document.getElementById('q').addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => carregarCatalogo(), 350);
        });

        document.getElementById('btnBuscar').addEventListener('click', carregarCatalogo);

        document.getElementById('btnTodos').addEventListener('click', () => {
            document.getElementById('q').value = '';
            filtroLetra = '';
            montarLetras();
            carregarCatalogo();
        });

        // ========= Cadastro =========
        function atualizarEditoraUI() {
            const chk = document.getElementById('lancadoNoBrasil');
            const box = document.getElementById('editoraBox');
            const editora = document.getElementById('editora');

            if (chk.checked) box.classList.remove('hidden');
            else {
                box.classList.add('hidden');
                editora.value = '';
            }
        }

        document.getElementById('lancadoNoBrasil').addEventListener('change', atualizarEditoraUI);

        async function cadastrarManga() {
            hideWarn();

            const titulo = document.getElementById('titulo').value.trim();
            const lancadoNoBrasil = document.getElementById('lancadoNoBrasil').checked;
            const editora = document.getElementById('editora').value.trim();

            if (!titulo) return showWarn('Título é obrigatório.');
            if (lancadoNoBrasil && !editora) return showWarn('Informe a editora se o mangá for lançado no Brasil.');

            try {
                const res = await apiFetch('/api/catalogo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, lancadoNoBrasil, editora })
                });

                const dados = await res.json();

                if (!res.ok) return showWarn(dados?.erro || 'Erro ao cadastrar.');

                document.getElementById('titulo').value = '';
                document.getElementById('editora').value = '';
                document.getElementById('lancadoNoBrasil').checked = false;
                atualizarEditoraUI();

                await carregarCatalogo();
                await carregarLogs();
            } catch {
                showWarn('Erro ao conectar com a API.');
            }
        }

        document.getElementById('btnCadastrar').addEventListener('click', cadastrarManga);

        document.getElementById('btnLimpar').addEventListener('click', () => {
            document.getElementById('titulo').value = '';
            document.getElementById('lancadoNoBrasil').checked = false;
            document.getElementById('editora').value = '';
            atualizarEditoraUI();
            hideWarn();
        });

        // ========= Editar =========
        let editIdAtual = null;

        function atualizarEditoraUIEdicao() {
            const chk = document.getElementById('editLancado');
            const box = document.getElementById('editEditoraBox');
            const editora = document.getElementById('editEditora');

            if (chk.checked) box.classList.remove('hidden');
            else {
                box.classList.add('hidden');
                editora.value = '';
            }
        }

        document.getElementById('editLancado').addEventListener('change', atualizarEditoraUIEdicao);

        function abrirEditar(id, titulo, lancado, editora) {
            editIdAtual = id;
            document.getElementById('modalIdInfo').textContent = `ID: ${id}`;
            document.getElementById('editTitulo').value = unescapeHtml(titulo);
            document.getElementById('editLancado').checked = !!lancado;
            document.getElementById('editEditora').value = unescapeHtml(editora || '');
            atualizarEditoraUIEdicao();
            document.getElementById('modalBackdrop').style.display = 'flex';
        }

        function fecharEditar() {
            editIdAtual = null;
            document.getElementById('modalBackdrop').style.display = 'none';
        }

        async function salvarEdicao() {
            hideWarn();
            if (!editIdAtual) return;

            const titulo = document.getElementById('editTitulo').value.trim();
            const lancadoNoBrasil = document.getElementById('editLancado').checked;
            let editora = document.getElementById('editEditora').value.trim();

            if (!titulo) return showWarn('Título é obrigatório.');
            if (lancadoNoBrasil && !editora) return showWarn('Informe a editora se for lançado no Brasil.');
            if (!lancadoNoBrasil) editora = null;

            const res = await apiFetch(`/api/catalogo/${editIdAtual}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, lancadoNoBrasil, editora })
            });

            const dados = await res.json();
            if (!res.ok) return showWarn(dados?.erro || 'Erro ao editar.');

            fecharEditar();
            await carregarCatalogo();
            await carregarLogs();
        }

        async function excluirManga(id, titulo) {
            hideWarn();
            const nome = unescapeHtml(titulo);

            if (!confirm(`Excluir "${nome}"?`)) return;

            const res = await apiFetch(`/api/catalogo/${id}`, { method: 'DELETE' });
            const dados = await res.json().catch(() => ({}));

            if (!res.ok) return showWarn(dados?.erro || 'Erro ao excluir.');

            await carregarCatalogo();
            await carregarLogs();
        }

        document.getElementById('btnSalvarEdicao').addEventListener('click', salvarEdicao);
        document.getElementById('btnCancelarEdicao').addEventListener('click', fecharEditar);
        document.getElementById('modalBackdrop').addEventListener('click', e => {
            if (e.target.id === 'modalBackdrop') fecharEditar();
        });

        // ========= Logs =========
        function formatarDataBr(iso) {
            try { return new Date(iso).toLocaleString('pt-BR'); }
            catch { return iso || ''; }
        }

        async function carregarLogs() {
            hideWarn();

            const status = document.getElementById('logsStatus');
            const list = document.getElementById('logsList');

            status.textContent = 'Carregando...';
            list.innerHTML = '<div style="padding:12px;color:#aaa;">Carregando...</div>';

            try {
                const res = await apiFetch('/api/adminlogs');
                const dados = await res.json();

                if (!res.ok) {
                    status.textContent = 'Erro';
                    list.innerHTML = '';
                    showWarn(dados?.erro || 'Erro ao carregar logs.');
                    return;
                }

                const logs = Array.isArray(dados) ? dados : [];

                if (logs.length === 0) {
                    status.textContent = 'Sem logs';
                    list.innerHTML = '<div style="padding:12px;color:#aaa;">Nenhum log ainda.</div>';
                    return;
                }

                status.textContent = `${logs.length} registro(s)`;

                list.innerHTML = logs.map(l => `
                  <div class="row">
                    <div style="min-width:0;">
                      <div class="title">${escapeHtml(l.acao || '—')}</div>
                      <div class="meta">
                        ${formatarDataBr(l.criadoEm)} • Admin: ${escapeHtml(l.admin || '—')}
                      </div>
                      ${l.detalhes ? `<div class="meta">Detalhes: ${escapeHtml(l.detalhes)}</div>` : ``}
                 </div>
                 </div>
                `).join('');

            } catch {
                status.textContent = 'Offline';
                list.innerHTML = '';
                showWarn('Não consegui conectar na API para buscar os logs.');
            }
        }

        document.getElementById('btnLogs').addEventListener('click', carregarLogs);

        // ========= Start =========
        (async () => {
            // monta navbar compartilhada (consistente em todas páginas)
            if (typeof mountNavbar === 'function') mountNavbar();

            atualizarEditoraUI();
            montarLetras();

            const ok = await garantirAdmin();
            if (!ok) return;

            setCatalogoCount('—');
            await carregarCatalogo();
            await carregarLogs();
        })();
    </script>
</body>
</html>
