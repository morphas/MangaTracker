<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manga Tracker - Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
        }

        .pageCenter {
            min-height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            box-sizing: border-box;
        }

        .login-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #e21;
        }

        h2 {
            text-align: center;
            margin: 0 0 30px 0;
        }

        label {
            font-size: 0.8em;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #333;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #e21;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

            .btn-entrar:hover {
                background: #ff3333;
            }

        .link-voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9em;
        }

            .link-voltar:hover {
                color: #ddd;
            }
    </style>
</head>

<body>
    <!-- Navbar compartilhada -->
    <div id="navbarHost"></div>

    <div class="pageCenter">
        <div class="login-card">
            <h2>Acessar Minha Lista</h2>

            <label>Usuário ou E-mail</label>
            <input type="text" id="identificador" placeholder="Ex: Morphas ou admin@mangatacker.com">

            <label>Senha</label>
            <input type="password" id="senha" placeholder="Sua senha secreta">

            <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>

            <a href="index.html" class="link-voltar">← Voltar para a Home</a>
        </div>
    </div>

    <script src="shared/navbar.js"></script>

    <script>
        mountNavbar();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement?.id;
                if (active === 'identificador' || active === 'senha') {
                    fazerLogin();
                }
            }
        });

        async function fazerLogin() {
            const identificador = document.getElementById('identificador').value.trim();
            const senha = document.getElementById('senha').value;

            if (!identificador || !senha) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                const resposta = await fetch('/api/usuario/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identificador, senha })
                });

                const resultado = await resposta.json().catch(() => ({}));

                if (resposta.ok) {

                    // 🔥 Compatibilidade entre isAdmin e ehAdmin
                    const usuarioNormalizado = {
                        ...resultado,
                        ehAdmin: resultado.ehAdmin ?? resultado.isAdmin ?? false
                    };

                    localStorage.setItem('usuarioLogado', JSON.stringify(usuarioNormalizado));

                    alert('Bem-vindo de volta, ' + (resultado.nome || 'usuário') + '!');
                    window.location.href = 'index.html';
                } else {
                    alert(resultado.erro || 'Login inválido.');
                }

            } catch (erro) {
                alert("Erro ao conectar com o servidor. Verifique se a API está rodando.");
            }
        }
    </script>
</body>
</html>
